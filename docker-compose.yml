networks:
  blib-network:
    driver: bridge

volumes:
  db_data:
  vendor_data:
  node_modules_data:
  composer_cache:

services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
      args:
        PHP_IMAGE_TAG: 8.5-fpm-bookworm
    container_name: blib
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
      - vendor_data:/var/www/vendor
      - composer_cache:/tmp/composer/cache
    networks:
      - blib-network
    env_file:
      - .env
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

  app-test:
    profiles: ["test"]
    build:
      context: .
      dockerfile: docker/Dockerfile
      args:
        PHP_IMAGE_TAG: 8.5-fpm-bookworm
    working_dir: /var/www
    volumes:
      - .:/var/www
      - vendor_data:/var/www/vendor
      - composer_cache:/tmp/composer/cache
    networks:
      - blib-network
    environment:
      APP_ENV: testing
      APP_DEBUG: "true"
      APP_URL: http://localhost
      APP_NAME: Blib
      APP_KEY: ${APP_KEY}
      DB_CONNECTION: sqlite
      DB_DATABASE: ":memory:"
      DB_FOREIGN_KEYS: "true"
      CACHE_STORE: array
      CACHE_LIMITER: array
      QUEUE_CONNECTION: sync
      SESSION_DRIVER: array
      MAIL_MAILER: array
      PULSE_ENABLED: "false"
      TELESCOPE_ENABLED: "false"
      BCRYPT_ROUNDS: "4"

  nginx:
    image: nginx:stable-alpine
    container_name: blib-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - .:/var/www
      - ./docker/nginx:/etc/nginx/conf.d
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - blib-network

  vite:
    image: node:22-bookworm
    container_name: blib-vite
    restart: unless-stopped
    working_dir: /var/www
    command: sh -lc "if [ ! -d node_modules ] || [ -z \"$(ls -A node_modules 2>/dev/null)\" ]; then npm install; fi && npm run dev -- --host 0.0.0.0 --port 5173"
    volumes:
      - .:/var/www
      - node_modules_data:/var/www/node_modules
      - vendor_data:/var/www/vendor
    ports:
      - "5173:5173"
    networks:
      - blib-network

  mysql:
    image: mysql:8.3.0
    container_name: blib-mysql
    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
      - ./docker/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh:ro
    networks:
      - blib-network
    ports:
      - "3306:3306"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  phpmyadmin:
    image: phpmyadmin:5
    container_name: blib-phpmyadmin
    environment:
      PMA_HOST: mysql
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    depends_on:
      - mysql
    ports:
      - "8080:80"
    networks:
      - blib-network
    restart: unless-stopped

  redis:
    image: redis:latest
    container_name: blib-redis
    ports:
      - "6379:6379"
    networks:
      - blib-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
